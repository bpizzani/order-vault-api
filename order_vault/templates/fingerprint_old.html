<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duplicate Account Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#0d0d0d] text-white">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        {% include "_sidebar.html" %}

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-10">
            <!-- Title -->
            <h1 class="text-4xl font-extrabold mb-8">Duplicate Account Intelligence</h1>

            <!-- Metrics Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="bg-[#1f1f1f] p-6 rounded-xl shadow-lg">
                    <h2 class="text-lg text-[#00d4ff]">Total Devices</h2>
                    <p id="totalDevices" class="text-4xl font-bold mt-2">0</p>
                </div>
                <div class="bg-[#1f1f1f] p-6 rounded-xl shadow-lg">
                    <h2 class="text-lg text-green-400">Total Users</h2>
                    <p id="totalUsers" class="text-4xl font-bold mt-2">0</p>
                </div>
                <div class="bg-[#1f1f1f] p-6 rounded-xl shadow-lg">
                    <h2 class="text-lg text-[#ff3b2f]">Duplicate Users</h2>
                    <p id="abusiveDevices" class="text-4xl font-bold mt-2">0</p>
                </div>
            </div>
            
            <!-- Date Range Controls -->
            <div class="flex flex-col md:flex-row items-center gap-3 mb-8">
              <label class="text-sm text-gray-300">
                Start:
                <input type="date" id="startDate" class="bg-[#0f0f0f] border border-gray-700 rounded px-3 py-2">
              </label>
              <label class="text-sm text-gray-300">
                End:
                <input type="date" id="endDate" class="bg-[#0f0f0f] border border-gray-700 rounded px-3 py-2">
              </label>
              <button id="applyRange" class="px-4 py-2 bg-sky-500 hover:bg-sky-400 rounded text-black font-semibold">
                Apply
              </button>
            </div>
            
                        

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-12">
                <!-- Duplicate Rate Line Chart -->
                <div class="bg-[#1a1a1a] p-6 rounded-lg shadow">
                    <h3 class="text-xl font-bold text-white mb-4 text-center">Daily Duplicate Rate (%)</h3>
                    <canvas id="duplicateRateChart"></canvas>
                </div>
            
                <!-- Duplicate User Count Bar Chart -->
                <div class="bg-[#1a1a1a] p-6 rounded-lg shadow">
                    <h3 class="text-xl font-bold text-white mb-4 text-center">Duplicate vs Total Devices</h3>
                    <canvas id="duplicateUserChart"></canvas>
                </div>
            </div>
            
            <!-- Abusive Promocodes Chart -->
            <div class="grid grid-cols-1 gap-8 mt-12 place-items-center">
              <div class="bg-[#1a1a1a] p-6 rounded-lg shadow w-full md:w-1/2">
                <h3 class="text-xl font-bold text-white mb-4 text-center">
                  Abusive rate by promocode (daily, top 5)
                </h3>
                <canvas id="promoAbuseChart"></canvas>
              </div>
            </div>
            
            <!-- Top Devices Chart -->
            <div class="grid grid-cols-1 gap-8 mt-12 place-items-center">
                <div class="bg-[#1a1a1a] p-6 rounded-lg shadow w-full md:w-1/2">
                    <h3 class="text-xl font-bold text-white mb-4 text-center">
                        Top Devices by User Count
                    </h3>
                    <canvas id="deviceUsageChart"></canvas>
                </div>
            </div>
            
            <!-- Loader -->
            <div id="loading" class="text-center mt-10 hidden">
                <p class="text-sm text-gray-400">Loading data...</p>
            </div>
        </main>
    </div>

<script>
  // --- tiny helpers ---
  const $ = (id) => document.getElementById(id);
  const setText = (id, text) => { const el = $(id); if (el) el.textContent = text; };
  const show = (id) => { const el = $(id); if (el) el.style.display = "grid"; };
    
  function buildQs() {
    const start = $("startDate")?.value?.trim();
    const end = $("endDate")?.value?.trim();
    const p = new URLSearchParams();
    if (start) p.set("start", start);
    if (end)   p.set("end", end);
    const qs = p.toString();
    return qs ? `?${qs}` : "";
  }

function ctxFresh(id) {
  const old = document.getElementById(id);
  if (!old) return null;
  const parent = old.parentNode;
  const fresh = document.createElement("canvas");
  fresh.id = id;
  parent.replaceChild(fresh, old);
  return fresh.getContext("2d");
}
    
  async function loadAll() {
    const qs = buildQs();
      
    // Device usage
    fetch(`/api/fingerprint/device-usage${qs}`)
      .then(res => res.json())
      .then(data => {
        if (data?.error) { alert(data.error); return; }
        const dupRate = data.total_users ? (data.duplicate_users / data.total_users) * 100 : 0;

        setText("totalDevices", data.total_devices ?? 0);
        setText("totalUsers", data.total_users ?? 0);
        setText("abusiveDevices", `${dupRate.toFixed(2)}%`);

        const labels = (data.user_per_device ?? []).map(d => d.device_id);
        const counts = (data.user_per_device ?? []).map(d => d.user_count);

        const ctx = ctxFresh("deviceUsageChart"); //$("deviceUsageChart")?.getContext("2d");
        if (ctx && labels.length) {
          new Chart(ctx, {
            type: 'bar',
            data: { labels, datasets: [{ label: 'Users per Device', data: counts, backgroundColor: '#facc15', borderColor: '#eab308', borderWidth: 1 }]},
            options: {
              indexAxis: 'y',   // 👈 THIS FLIPS THE AXIS
              responsive: true,
              plugins: { legend: { display: false }, tooltip: { callbacks: { label: (c) => `${c.raw} users` } } },
              scales: {
                y: { beginAtZero: true, title: { display: true, text: 'User Count' } },
                x: {
                  ticks: { callback: (_, i) => (labels[i] ?? '').slice(0, 6) + '...' },
                  title: { display: true, text: 'Device ID' }
                }
              }
            }
          });
        }
      })
      .catch(console.error);

    // Duplicate rate daily
    fetch(`/api/fingerprint/duplicate-rate-daily${qs}`)
      .then(res => res.json())
      .then(data => {
        if (!Array.isArray(data)) return;

        const labels = data.map(d => d.date);
        const duplicateRate = data.map(d => d.duplicate_user_rate);
        const duplicates = data.map(d => d.total_users);
        const totals = data.map(d => d.total_devices);

        const rateCtx = ctxFresh("duplicateRateChart"); //$("duplicateRateChart")?.getContext("2d");
        if (rateCtx && labels.length) {
          new Chart(rateCtx, {
            type: "line",
            data: { labels, datasets: [{ label: "Duplicate Rate (%)", data: duplicateRate, borderColor: "#f87171", backgroundColor: "#f87171", tension: 0.3, fill: false }] },
            options: { responsive: true, scales: { y: { beginAtZero: true, max: 100, title: { display: true, text: "Rate (%)" } }, x: { title: { display: true, text: "Date" } } } }
          });
        }

        const countCtx =  ctxFresh("duplicateUserChart"); //$("duplicateUserChart")?.getContext("2d");
        if (countCtx && labels.length) {
          new Chart(countCtx, {
            type: "bar",
            data: {
              labels,
              datasets: [
                { label: "Total Users", data: duplicates, backgroundColor: "#fb923c" },
                { label: "Total Devices", data: totals, backgroundColor: "#38bdf8" }
              ]
            },
            options: { responsive: true, scales: { y: { beginAtZero: true, title: { display: true, text: "Devices" } }, x: { title: { display: true, text: "Date" } } } }
          });
        }
      })
      .catch(console.error);

    // Abusive promocodes daily
fetch(`/api/fingerprint/abusive-promocodes-daily${qs}`)
  .then(res => res.json())
  .then(rows => {
    if (!Array.isArray(rows) || rows.length === 0) return;

    // 1) Unique, sorted date labels
    const labels = Array.from(new Set(rows.map(r => r.date))).sort(); // "YYYY-MM-DD"

    // 2) Group by promocode
    const byCode = new Map(); // code -> { perDate: Map(date -> row), totalUses: number }
    for (const r of rows) {
      const code = r.promocode ?? "(unknown)";
      if (!byCode.has(code)) byCode.set(code, { perDate: new Map(), totalUses: 0 });
      const rec = byCode.get(code);
      rec.perDate.set(r.date, r);
      rec.totalUses += (r.total_uses || 0);
    }

    // Top 5 by total usage
    const TOP_N = 5;
    const topCodes = Array.from(byCode.entries())
      .sort((a, b) => b[1].totalUses - a[1].totalUses)
      .slice(0, TOP_N)
      .map(([code]) => code);

    const palette = ["#60a5fa","#f472b6","#f59e0b","#34d399","#a78bfa","#fb7185","#22d3ee","#f97316","#4ade80","#e879f9"];

    const datasets = topCodes.map((code, i) => {
      const rec = byCode.get(code);
      const data = labels.map(d => {
        const row = rec.perDate.get(d);
        return row ? (row.abusive_use_rate ?? 0) : null;
      });
      return {
        label: code,
        data,
        borderColor: palette[i % palette.length],
        backgroundColor: palette[i % palette.length],
        tension: 0.3,
        fill: false,
        spanGaps: true,
      };
    });

    const ctx = ctxFresh("promoAbuseChart");
    if (!ctx) return;

    new Chart(ctx, {
      type: "line",
      data: { labels, datasets },
      options: {
        responsive: true,
        plugins: {
          legend: { position: "bottom", labels: { color: "#e5e7eb" } },
          tooltip: { callbacks: { label: (it) => `${it.dataset.label}: ${it.formattedValue}%` } }
        },
        scales: {
          y: { beginAtZero: true, max: 100, title: { display: true, text: "Abusive use rate (%)", color: "#e5e7eb" } },
          x: { title: { display: true, text: "Date", color: "#e5e7eb" } }
        }
      }
    });
  })
  .catch(console.error);
  }
    
  function renderList(elId, arr) {
    const el = $(elId);
    if (!el) return;
    el.innerHTML = (arr && arr.length)
      ? arr.map(v => `<tr><td class="py-1 border-b border-gray-800 break-all">${v}</td></tr>`).join("")
      : `<tr><td class="py-2 text-gray-400">No data</td></tr>`;
  }

  async function runSearch(url, params) {
    const qs = new URLSearchParams(params).toString();
    const res = await fetch(`${url}?${qs}`);
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  }

  document.addEventListener("DOMContentLoaded", () => {
    // loader
    const loader = $("loading");
    if (loader) loader.classList.remove("hidden");
      
    const today = new Date();
    const start = new Date(today); start.setDate(today.getDate() - 20);
    $("startDate").value = start.toISOString().slice(0,10);
    $("endDate").value = today.toISOString().slice(0,10);

    $("applyRange")?.addEventListener("click", () => {
        // optionally clear existing charts before redraw if you recreate them 
        loadAll();
    });

    loadAll();


  });
</script>
</body>
</html>
