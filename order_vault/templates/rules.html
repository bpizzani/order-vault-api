<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Reglas</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h2, h3 {
            color: #0ff;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 2rem;
            letter-spacing: 2px;
        }

        h3 {
            font-size: 1.5rem;
        }

        form {
            background: #222;
            padding: 30px;
            margin: 50px auto;
            border-radius: 15px;
            width: 80%;
            max-width: 400px;
            box-shadow: 0px 8px 20px rgba(0, 255, 255, 0.1);
            transition: all 0.3s ease-in-out;
        }

        form:hover {
            transform: scale(1.02);
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 1rem;
            text-align: left;
            color: #aaa;
        }

        select, input, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 2px solid #333;
            background-color: #333;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        select:hover, input:hover, button:hover {
            border-color: #0ff;
        }

        button {
            background-color: #0ff;
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #06b8b8;
        }

        table {
            width: 80%;
            margin: 50px auto;
            background: #1f1f1f;
            border-collapse: collapse;
            border-radius: 10px;
            box-shadow: 0px 8px 20px rgba(0, 255, 255, 0.1);
        }

        th, td {
            padding: 15px;
            border: 1px solid #444;
            text-align: center;
            font-size: 1rem;
        }

        th {
            background: #333;
            color: #0ff;
            font-weight: bold;
        }

        td {
            background: #222;
            color: #bbb;
        }

        .delete-btn {
            background: red;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .delete-btn:hover {
            background: darkred;
        }

        /* Adding smooth animations */
        .fade-in {
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

    </style>
</head>
<body>

    <h2>NodeTrail - Gestión de Reglas</h2>

    <form id="ruleForm" class="fade-in">
        <label>Atributo:</label>
        <select id="attribute">
            <option value="device_id">Device ID</option>
            <option value="email">Email</option>
            <option value="phone">Phone</option>
            <option value="card_details">Card Details</option>
        </select>

        <label>Umbral (Threshold):</label>
        <input type="number" id="threshold" required>

        <label>Promocode:</label>
        <input type="text" id="promocode" required>
        
        <button type="submit">Agregar Regla</button>
    </form>

    <h3>Reglas Configuradas</h3>
    <table class="fade-in">
        <thead>
            <tr>
                <th>Atributo</th>
                <th>Umbral</th>
                <th>Promocode</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="rulesTable">
            <!-- Aquí se mostrarán las reglas dinámicamente -->
        </tbody>
    </table>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            loadRules(); // Cargar reglas al inicio

            document.getElementById("ruleForm").addEventListener("submit", function (event) {
                event.preventDefault();
                addRule();
            });
        });

        function addRule() {
            const attribute = document.getElementById("attribute").value;
            const threshold = document.getElementById("threshold").value;
            const promocode = document.getElementById("promocode").value;

            fetch("https://order-vault-api-cb7f5f7bf4f1.herokuapp.com/api/rules", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ attribute, threshold, promocode })
            })
            .then(response => response.text())  // Fetch the response as text
            .then(text => {
                console.log("Response Text:", text);  // Log the raw response text
                try {
                    const data = JSON.parse(text);  // Attempt to parse JSON
                    loadRules();
                    document.getElementById("ruleForm").reset();
                } catch (error) {
                    console.error("Error parsing JSON:", error);
                }
            })
            .catch(error => console.error("Error:", error));
        }

        function loadRules() {
            fetch("https://order-vault-api-cb7f5f7bf4f1.herokuapp.com/api/rules", { method: "GET" })
            .then(response => response.text())  // Fetch the response as text
            .then(text => {
                console.log("Response Text:", text);  // Log the raw response text
                try {
                    const data = JSON.parse(text);  // Attempt to parse JSON
                    const rulesTable = document.getElementById("rulesTable");
                    rulesTable.innerHTML = "";
                    data.forEach(rule => {
                        const row = document.createElement("tr");
                        row.innerHTML = `
                            <td>${rule.attribute}</td>
                            <td>${rule.threshold}</td>
                            <td>${rule.promocode}</td>
                            <td><button class="delete-btn" onclick="deleteRule(${rule.id})">Eliminar</button></td>
                        `;
                        rulesTable.appendChild(row);
                    });
                } catch (error) {
                    console.error("Error parsing JSON:", error);
                }
            })
            .catch(error => console.error("Error:", error));
        }

        function deleteRule(ruleId) {
            fetch(`/api/rules/${ruleId}`, {
                method: "DELETE"
            })
            .then(() => loadRules())
            .catch(error => console.error("Error:", error));
        }
    </script>

</body>
</html>
