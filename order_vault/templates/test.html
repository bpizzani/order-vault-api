<!DOCTYPE html>
<html lang="en">
<body class="bg-black text-white font-sans">

  <div class="flex h-screen">
    <!-- Sidebar -->
    {% include "_sidebar.html" %}

    <!-- Main Content -->
    <main class="flex-1 p-10 bg-black">
      <!-- Search Header -->
      <div class="mb-10 text-center">
        <h1 class="text-4xl font-bold text-white mb-3">Promo Abuse Dashboard</h1>
        <p class="text-gray-400 mb-6">Track fraudulent orders & promo misuse in real-time</p>

        <div class="flex justify-center">
          <input type="text" id="promocodeInput"
            class="w-1/3 p-3 rounded-l-lg bg-gray-800 text-white border border-red-500 placeholder-gray-400 outline-none"
            placeholder="Enter promocode..." />
          <button onclick="fetchPromocodeUsage()"
            class="bg-red-600 hover:bg-red-500 text-white px-6 py-3 rounded-r-lg font-semibold transition">Search</button>
        </div>
      </div>

      <!-- Metrics -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="bg-gray-900 border border-red-600 rounded-lg p-6 text-center shadow-xl">
          <h2 class="text-lg text-gray-300">Total Users</h2>
          <p id="totalOrders" class="text-4xl font-bold mt-2 text-white">0</p>
        </div>
        <div class="bg-gray-900 border border-green-600 rounded-lg p-6 text-center shadow-xl">
          <h2 class="text-lg text-gray-300">Genuine Users</h2>
          <p id="uniqueUsers" class="text-4xl font-bold mt-2 text-green-400">0</p>
        </div>
        <div class="bg-gray-900 border border-yellow-500 rounded-lg p-6 text-center shadow-xl">
          <h2 class="text-lg text-gray-300">Abusive Users</h2>
          <p id="abusiveUsers" class="text-4xl font-bold mt-2 text-yellow-300">0</p>
          <p id="abusivePercentage" class="text-md mt-2">0%</p>
        </div>
      </div>

      <!-- Chart Sections -->
      <section class="bg-gray-900 rounded-lg p-6 shadow-lg mb-10">
        <h3 class="text-2xl font-bold text-white text-center mb-4">Order Breakdown</h3>
        <canvas id="promocodeChart"></canvas>
      </section>

      <section class="bg-gray-900 rounded-lg p-6 shadow-lg mb-10">
        <h3 class="text-2xl font-bold text-white text-center mb-4">Abuse Rate by Day</h3>
        <canvas id="abuseRateChart"></canvas>
      </section>

      <section class="bg-gray-900 rounded-lg p-6 shadow-lg mb-10">
        <h3 class="text-2xl font-bold text-white text-center mb-4">Total Orders by Day</h3>
        <canvas id="totalOrdersChart"></canvas>
      </section>

      <!-- Loading Indicator -->
      <div id="loading" class="text-center text-red-500 mt-4 hidden">Loading...</div>
    </main>
  </div>
</body>
</html>
