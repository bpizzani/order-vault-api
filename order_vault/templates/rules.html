<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rediim - Gestión de Reglas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0d0d0d] text-[#f5f5f5] font-sans">
  <div class="flex h-screen overflow-hidden">
    {% include "_sidebar.html" %}

    <main class="flex-1 overflow-y-auto p-10">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-extrabold">Gestión de Reglas</h1>
        <button id="openModal" class="button-rediim">+ Agregar Regla</button>
      </div>

      <div id="rulesGrid" class="grid-gap">
        <!-- Rules will go here -->
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="ruleModal" class="fixed inset-0 hidden bg-black bg-opacity-50 flex justify-center items-center">
    <div class="modal">
      <h2 class="text-xl font-bold mb-4">Agregar Regla</h2>
      <form id="ruleForm">
        <label>Atributo:</label>
        <select id="attribute" class="input-rediim w-full mb-4">
          <option value="device_id">Device ID</option>
          <option value="email">Email</option>
          <option value="phone">Phone</option>
          <option value="card_details">Card Details</option>
        </select>

        <label>Umbral:</label>
        <input type="number" id="threshold" class="input-rediim w-full mb-4" required>

        <label>Promocode:</label>
        <input type="text" id="promocode" class="input-rediim w-full mb-6" required>

        <button type="submit" class="button-rediim w-full">Agregar</button>
      </form>

      <button id="closeModal" class="w-full mt-4 button-rediim bg-red-500 hover:bg-red-600">Cancelar</button>
    </div>
  </div>
</body>
    
    <script>
        document.getElementById("openModal").addEventListener("click", () => {
            document.getElementById("ruleModal").classList.remove("hidden");
        });
        document.getElementById("closeModal").addEventListener("click", () => {
            document.getElementById("ruleModal").classList.add("hidden");
        });
        
        document.getElementById("ruleForm").addEventListener("submit", function(event) {
            event.preventDefault();
            addRule();
        });
        
        function addRule() {
            const attribute = document.getElementById("attribute").value;
            const threshold = document.getElementById("threshold").value;
            const promocode = document.getElementById("promocode").value;
            
            fetch("https://console.rediim.com/api/rules", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ attribute, threshold, promocode }),
                credentials: "include"
            })
            .then(() => {
                loadRules();
                document.getElementById("ruleModal").classList.add("hidden");
            });
        }
        
        function loadRules() {
            fetch("https://console.rediim.com/api/rules", {
                method: "GET",
                credentials: "include"
            })
            .then(response => response.json())
            .then(data => {
                const rulesGrid = document.getElementById("rulesGrid");
                rulesGrid.innerHTML = "";
                data.forEach(rule => {
                    const card = document.createElement("div");
                    card.className = "bg-[#1f1f1f] p-6 rounded-lg shadow-lg";
                    card.innerHTML = `
                        <h3 class="text-lg font-bold mb-2">${rule.attribute}</h3>
                        <p><strong>Umbral:</strong> ${rule.threshold}</p>
                        <p><strong>Promocode:</strong> ${rule.promocode}</p>
                        <button class="mt-4 bg-red-500 text-white py-2 px-4 rounded hover:bg-red-600" onclick="deleteRule(${rule.id})">Eliminar</button>
                    `;
                    rulesGrid.appendChild(card);
                });
            });
        }
        
        function deleteRule(ruleId) {
            fetch(`https://console.rediim.com/api/rules/${ruleId}`, { method: "DELETE" })
            .then(() => loadRules());
        }
        
        document.addEventListener("DOMContentLoaded", loadRules);
    </script>
</html>
