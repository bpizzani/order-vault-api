<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <title>Customer Attributes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0d0d0d] text-[#f5f5f5] font-sans">
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    {% include "_sidebar.html" %}

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-10">
      <!-- Title -->
      <h1 class="text-4xl font-extrabold mb-10 text-center text-white">Buscar Atributos de Cliente</h1>

      <!-- Search -->
      <section class="flex justify-center mb-10">
        <form id="emailForm" class="bg-[#1f1f1f] p-8 rounded-xl shadow-xl w-full max-w-xl">
          <label for="email" class="block text-lg mb-2">Email del Cliente:</label>
          <input
            type="email"
            id="email"
            required
            placeholder="usuario@correo.com"
            class="input-rediim w-full mb-4"
          />
          <button
            type="submit"
            class="button-rediim w-full"
          >
            Buscar
          </button>
        </form>
      </section>

      <!-- Loading -->
      <div id="loading" class="text-center text-white text-xl hidden">
        Cargando datos, por favor espera...
      </div>

      <!-- Tables Section -->
      <section class="my-12">
        <h2 class="text-2xl font-bold text-center text-white mb-6">Resumen de Atributos del Cliente</h2>
        <div class="overflow-x-auto">
          <table id="customerAttributesTable" class="w-4/5 mx-auto bg-[#1f1f1f] rounded-xl shadow-lg">
            <thead>
              <tr class="bg-[#2a2a2a] text-white text-left">
                <th class="py-3 px-6 text-lg">Atributo</th>
                <th class="py-3 px-6 text-lg">Cantidad</th>
              </tr>
            </thead>
            <tbody class="text-gray-300">
              <!-- Dynamic content -->
            </tbody>
          </table>
        </div>
      </section>

      <section class="my-12">
        <h2 class="text-2xl font-bold text-center text-white mb-6">Atributos de la Network</h2>
        <div class="overflow-x-auto">
          <table id="networkAttributesTable" class="w-4/5 mx-auto bg-[#1f1f1f] rounded-xl shadow-lg">
            <thead>
              <tr class="bg-[#2a2a2a] text-white text-left">
                <th class="py-3 px-6 text-lg">Atributo</th>
                <th class="py-3 px-6 text-lg">Cantidad</th>
              </tr>
            </thead>
            <tbody class="text-gray-300">
              <!-- Dynamic content -->
            </tbody>
          </table>
        </div>
      </section>

      <section class="my-12">
        <h2 class="text-2xl font-bold text-center text-white mb-6">Conteo de Ordenes por Promocodes</h2>
        <div class="overflow-x-auto">
          <table id="promocodeOrderTable" class="w-4/5 mx-auto bg-[#1f1f1f] rounded-xl shadow-lg">
            <thead>
              <tr class="bg-[#2a2a2a] text-white text-left">
                <th class="py-3 px-6 text-lg">Promocode</th>
                <th class="py-3 px-6 text-lg">Total de Ordenes</th>
              </tr>
            </thead>
            <tbody class="text-gray-300">
              <!-- Dynamic content -->
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
</body>

    <script>
        document.getElementById("emailForm").addEventListener("submit", function(event) {
            event.preventDefault();  // Prevent page refresh
            const email = document.getElementById("email").value;
            showLoading(true);  // Show loading indicator
            fetchCustomerAttributes(email);
            fetchNetworkAttributes(email);
            fetchPromocodeOrderCount(email);
        });

        // Show or hide the loading indicator
        function showLoading(show) {
            const loadingElement = document.getElementById("loading");
            if (show) {
                loadingElement.classList.remove("hidden");
            } else {
                loadingElement.classList.add("hidden");
            }
        }

        function fetchCustomerAttributes(email) {
            fetch(`https://console.rediim.com/api/customer/attributes-summary?email=${email}`)
                .then(response => response.json())
                .then(data => {
                    console.log("API Response - Customer Attributes Summary:", data);

                    const tableBody = document.querySelector("#customerAttributesTable tbody");
                    tableBody.innerHTML = "";  // Clear previous data

                    if (data.message || Object.keys(data).length === 0) {
                        tableBody.innerHTML = "<tr><td colspan='2' class='text-center text-gray-500'>No se encontraron datos.</td></tr>";
                        return;
                    }

                    // Display total orders
                    const rowOrders = document.createElement("tr");
                    rowOrders.innerHTML = `
                        <td class="py-3 px-6">Total de Ordenes</td>
                        <td class="py-3 px-6">${data.total_orders}</td>
                    `;
                    tableBody.appendChild(rowOrders);

                    // Display distinct cards
                    const rowCards = document.createElement("tr");
                    rowCards.innerHTML = `
                        <td class="py-3 px-6">Tarjetas Distintas</td>
                        <td class="py-3 px-6">${data.distinct_cards}</td>
                    `;
                    tableBody.appendChild(rowCards);

                    // Display distinct phones
                    const rowPhones = document.createElement("tr");
                    rowPhones.innerHTML = `
                        <td class="py-3 px-6">Teléfonos Distintos</td>
                        <td class="py-3 px-6">${data.distinct_phones}</td>
                    `;
                    tableBody.appendChild(rowPhones);

                    // Display distinct devices
                    const rowDevices = document.createElement("tr");
                    rowDevices.innerHTML = `
                        <td class="py-3 px-6">Dispositivos Distintos</td>
                        <td class="py-3 px-6">${data.distinct_devices}</td>
                    `;
                    tableBody.appendChild(rowDevices);
                })
                .catch(error => {
                    console.error("Error fetching customer attributes:", error);
                    const tableBody = document.querySelector("#customerAttributesTable tbody");
                    tableBody.innerHTML = "<tr><td colspan='2' class='text-center text-red-500'>Error al obtener datos.</td></tr>";
                })
                .finally(() => {
                    showLoading(false);  // Hide loading indicator
                });
        }

        function fetchNetworkAttributes(email) {
            fetch(`https://console.rediim.com/api/customer/attributes-network?email=${encodeURIComponent(email)}`)
                .then(response => response.json())
                .then(data => {
                    console.log("API Response - Network Attributes:", data);

                    const tableBody = document.querySelector("#networkAttributesTable tbody");
                    tableBody.innerHTML = "";  // Clear previous data

                    if (data.message || Object.keys(data).length === 0) {
                        tableBody.innerHTML = "<tr><td colspan='2' class='text-center text-gray-500'>No se encontraron datos en la network.</td></tr>";
                        return;
                    }

                    // Render the network attributes data
                    const networkData = data;

                    // Display connected customers
                    const rowCustomers = document.createElement("tr");
                    rowCustomers.innerHTML = `
                        <td class="py-3 px-6">Clientes Conectados</td>
                        <td class="py-3 px-6">${networkData.connected_customers}</td>
                    `;
                    tableBody.appendChild(rowCustomers);

                    // Display connected orders
                    const rowOrders = document.createElement("tr");
                    rowOrders.innerHTML = `
                        <td class="py-3 px-6">Ordenes Conectadas</td>
                        <td class="py-3 px-6">${networkData.connected_orders}</td>
                    `;
                    tableBody.appendChild(rowOrders);

                    // Display distinct cards
                    const rowCards = document.createElement("tr");
                    rowCards.innerHTML = `
                        <td class="py-3 px-6">Tarjetas Distintas</td>
                        <td class="py-3 px-6">${networkData.distinct_cards}</td>
                    `;
                    tableBody.appendChild(rowCards);

                    // Display distinct phones
                    const rowPhones = document.createElement("tr");
                    rowPhones.innerHTML = `
                        <td class="py-3 px-6">Teléfonos Distintos</td>
                        <td class="py-3 px-6">${networkData.distinct_phones}</td>
                    `;
                    tableBody.appendChild(rowPhones);

                    // Display distinct devices
                    const rowDevices = document.createElement("tr");
                    rowDevices.innerHTML = `
                        <td class="py-3 px-6">Dispositivos Distintos</td>
                        <td class="py-3 px-6">${networkData.distinct_devices}</td>
                    `;
                    tableBody.appendChild(rowDevices);

                    // Display distinct promocodes
                    const rowPromocodes = document.createElement("tr");
                    rowPromocodes.innerHTML = `
                        <td class="py-3 px-6">Promocodes Distintos</td>
                        <td class="py-3 px-6">${networkData.distinct_promocodes}</td>
                    `;
                    tableBody.appendChild(rowPromocodes);

                    // Display total promocodes
                    const rowTotalPromocodes = document.createElement("tr");
                    rowTotalPromocodes.innerHTML = `
                        <td class="py-3 px-6">Total Promocodes</td>
                        <td class="py-3 px-6">${networkData.total_promocodes}</td>
                    `;
                    tableBody.appendChild(rowTotalPromocodes);
                })
                .catch(error => {
                    console.error("Error al obtener los atributos de la network:", error);
                    const tableBody = document.querySelector("#networkAttributesTable tbody");
                    tableBody.innerHTML = "<tr><td colspan='2' class='text-center text-red-500'>Error al obtener los atributos de la network.</td></tr>";
                })
                .finally(() => {
                    showLoading(false);  // Hide loading indicator
                });
        }

        function fetchPromocodeOrderCount(email) {
            fetch(`https://console.rediim.com/api/promocode/order-count?email=${encodeURIComponent(email)}`)
                .then(response => response.json())
                .then(data => {
                    console.log("API Response - Promocode Order Count:", data);

                    const tableBody = document.querySelector("#promocodeOrderTable tbody");
                    tableBody.innerHTML = "";  // Clear previous data

                    if (data.message || Object.keys(data).length === 0) {
                        tableBody.innerHTML = "<tr><td colspan='2' class='text-center text-gray-500'>No se encontraron datos en la network.</td></tr>";
                        return;
                    }

                    // Render the promocode order count data
                    const networkData = data.promocode_stats;

                    // Display each promocode and the corresponding order count
                    networkData.forEach(promocodeStat => {
                        const rowPromocode = document.createElement("tr");
                        rowPromocode.innerHTML = `
                            <td class="py-3 px-6">Promocode: ${promocodeStat.promocode}</td>
                            <td class="py-3 px-6">${promocodeStat.total_orders}</td>
                        `;
                        tableBody.appendChild(rowPromocode);
                    });
                })
                .catch(error => {
                    console.error("Error al obtener los atributos de la network:", error);
                    const tableBody = document.querySelector("#promocodeOrderTable tbody");
                    tableBody.innerHTML = "<tr><td colspan='2' class='text-center text-red-500'>Error al obtener los atributos de la network.</td></tr>";
                })
                .finally(() => {
                    showLoading(false);  // Hide loading indicator
                });
        }
    </script>
</html>
