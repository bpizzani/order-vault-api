<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Reglas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans bg-gray-900 text-white">

    <header class="text-center py-16 bg-white">
        <h1 class="text-4xl font-bold text-gray-900">NodeTrail - Gestión de Reglas</h1>
    </header>

    <!-- Form Section -->
    <section class="py-16 bg-gray-800">
        <div class="max-w-lg mx-auto bg-gray-900 p-8 rounded-lg shadow-lg">
            <form id="ruleForm">
                <label class="block text-gray-300 text-sm mb-2">Atributo:</label>
                <select id="attribute" class="w-full p-3 mb-4 bg-gray-700 text-white rounded-md">
                    <option value="device_id">Device ID</option>
                    <option value="email">Email</option>
                    <option value="phone">Phone</option>
                    <option value="card_details">Card Details</option>
                </select>

                <label class="block text-gray-300 text-sm mb-2">Umbral (Threshold):</label>
                <input type="number" id="threshold" class="w-full p-3 mb-4 bg-gray-700 text-white rounded-md" required>

                <label class="block text-gray-300 text-sm mb-2">Promocode:</label>
                <input type="text" id="promocode" class="w-full p-3 mb-6 bg-gray-700 text-white rounded-md" required>
                
                <button type="submit" class="w-full bg-[rgb(26,233,112)] text-black font-bold py-3 px-6 rounded-md hover:bg-[rgb(20,190,80)] transition duration-300">Agregar Regla</button>
            </form>
        </div>
    </section>

    <!-- Rules Table -->
    <section class="py-16 bg-gray-800">
        <h2 class="text-3xl font-bold text-center text-gray-300 mb-8">Reglas Configuradas</h2>
        <div class="overflow-x-auto bg-gray-900 p-8 rounded-lg shadow-lg">
            <table class="min-w-full text-sm text-center text-gray-400">
                <thead>
                    <tr>
                        <th class="px-6 py-3 bg-gray-700">Atributo</th>
                        <th class="px-6 py-3 bg-gray-700">Umbral</th>
                        <th class="px-6 py-3 bg-gray-700">Promocode</th>
                        <th class="px-6 py-3 bg-gray-700">Acción</th>
                    </tr>
                </thead>
                <tbody id="rulesTable">
                    <!-- Aquí se mostrarán las reglas dinámicamente -->
                </tbody>
            </table>
        </div>
    </section>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            loadRules(); // Cargar reglas al inicio

            document.getElementById("ruleForm").addEventListener("submit", function (event) {
                event.preventDefault();
                addRule();
            });
        });

        function addRule() {
            const attribute = document.getElementById("attribute").value;
            const threshold = document.getElementById("threshold").value;
            const promocode = document.getElementById("promocode").value;

            fetch("https://order-vault-api-cb7f5f7bf4f1.herokuapp.com/api/rules", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ attribute, threshold, promocode })
            })
            .then(response => response.text())
            .then(text => {
                console.log("Response Text:", text); 
                try {
                    const data = JSON.parse(text);
                    loadRules();
                    document.getElementById("ruleForm").reset();
                } catch (error) {
                    console.error("Error parsing JSON:", error);
                }
            })
            .catch(error => console.error("Error:", error));
        }

        function loadRules() {
            fetch("https://order-vault-api-cb7f5f7bf4f1.herokuapp.com/api/rules", { method: "GET" })
            .then(response => response.text())
            .then(text => {
                console.log("Response Text:", text);
                try {
                    const data = JSON.parse(text);
                    const rulesTable = document.getElementById("rulesTable");
                    rulesTable.innerHTML = "";
                    data.forEach(rule => {
                        const row = document.createElement("tr");
                        row.innerHTML = `
                            <td class="px-6 py-4 bg-gray-700">${rule.attribute}</td>
                            <td class="px-6 py-4 bg-gray-700">${rule.threshold}</td>
                            <td class="px-6 py-4 bg-gray-700">${rule.promocode}</td>
                            <td class="px-6 py-4 bg-gray-700"><button class="bg-red-600 text-white py-2 px-4 rounded-md hover:bg-red-700" onclick="deleteRule(${rule.id})">Eliminar</button></td>
                        `;
                        rulesTable.appendChild(row);
                    });
                } catch (error) {
                    console.error("Error parsing JSON:", error);
                }
            })
            .catch(error => console.error("Error:", error));
        }

        function deleteRule(ruleId) {
            fetch(`/api/rules/${ruleId}`, {
                method: "DELETE"
            })
            .then(() => loadRules())
            .catch(error => console.error("Error:", error));
        }
    </script>

</body>
</html>
