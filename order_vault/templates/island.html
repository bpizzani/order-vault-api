
<!DOCTYPE html>
<html lang="es">
<head>
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        h2 {
            color: #0ff;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        form {
            background: #222;
            padding: 20px;
            border-radius: 15px;
            width: 80%;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0px 8px 20px rgba(0, 255, 255, 0.1);
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 1rem;
            color: #aaa;
            text-align: left;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 2px solid #333;
            background-color: #333;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:hover, button:hover {
            border-color: #0ff;
        }

        button {
            background-color: #0ff;
            cursor: pointer;
            font-weight: bold;
            border: none;
        }

        button:hover {
            background-color: #06b8b8;
        }

        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            background: #1f1f1f;
            box-shadow: 0px 8px 20px rgba(0, 255, 255, 0.1);
        }

        th, td {
            padding: 12px;
            border: 1px solid #444;
            text-align: center;
            font-size: 1rem;
        }

        th {
            background: #333;
            color: #0ff;
        }

        td {
            background: #222;
            color: #bbb;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Cliente</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; text-align: center; }
        form { margin: 20px auto; padding: 20px; background: #222; border-radius: 10px; width: 50%; }
        input, button { margin: 10px; padding: 10px; border-radius: 5px; border: none; }
        button { background-color: #0ff; color: black; cursor: pointer; }
        table { width: 60%; margin: 20px auto; border-collapse: collapse; background: #1f1f1f; }
        th, td { padding: 10px; border: 1px solid #444; }
        th { background: #333; color: #0ff; }
    </style>
</head>
<body>
    <h2>Consulta de Cliente en la Red</h2>
    <form id="customerForm">
        <label for="email">Ingrese el Email del Cliente:</label>
        <input type="email" id="email" required>
        <button type="submit">Consultar</button>
    </form>
    <h3>Atributos Asociados</h3>
    <table>
        <thead>
            <tr><th>Tipo de Atributo</th><th>Cantidad</th></tr>
        </thead>
        <tbody id="resultsTable"></tbody>
    </table>
    <script>
        document.getElementById("customerForm").addEventListener("submit", function(event) {
            event.preventDefault();
            const email = document.getElementById("email").value;
            fetch(`/api/customer-attributes?email=${email}`)
                .then(response => response.json())
                .then(data => {
                    const tableBody = document.getElementById("resultsTable");
                    tableBody.innerHTML = "";
                    for (const [attribute, count] of Object.entries(data)) {
                        const row = `<tr><td>${attribute}</td><td>${count}</td></tr>`;
                        tableBody.innerHTML += row;
                    }
                })
                .catch(error => console.error("Error:", error));
        });
    </script>
</body>
</html>
