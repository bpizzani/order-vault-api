<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Attributes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h2 {
            color: #0ff;
        }

        form {
            background: #222;
            padding: 20px;
            margin: 20px auto;
            border-radius: 10px;
            width: 50%;
            max-width: 400px;
            box-shadow: 0px 8px 20px rgba(0, 255, 255, 0.1);
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #333;
            background: #333;
            color: white;
            font-size: 16px;
        }

        button {
            background: #0ff;
            cursor: pointer;
        }

        button:hover {
            background: #06b8b8;
        }

        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            background: #1f1f1f;
            color: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #444;
        }

        th {
            background: #333;
            color: #0ff;
        }

        td {
            background: #222;
        }

    </style>
</head>
<body>

    <h2>Buscar Atributos de Cliente</h2>

    <form id="emailForm">
        <label for="email">Email del Cliente:</label>
        <input type="email" id="email" required>
        <button type="submit">Buscar</button>
    </form>

    <h3>Atributos del Cliente</h3>
    <table id="attributesTable">
        <thead>
            <tr>
                <th>Atributo</th>
                <th>Cantidad</th>
            </tr>
        </thead>
        <tbody>
            <!-- Aquí se llenarán los datos dinámicamente -->
        </tbody>
    </table>

    <h3>Atributos de la Network</h3>
    <table id="networkAttributesTable">
        <thead>
            <tr>
                <th>Atributo</th>
                <th>Cantidad</th>
            </tr>
        </thead>
        <tbody>
            <!-- Aquí se llenarán los datos dinámicamente -->
        </tbody>
    </table>

    <script>
        document.getElementById("emailForm").addEventListener("submit", function(event) {
            event.preventDefault();  // Evita el refresco de la página
            const email = document.getElementById("email").value;
            fetchCustomerAttributes(email);
            fetchNetworkAttributes(email);
        });

        function fetchCustomerAttributes(email) {
            fetch(`https://order-vault-api-cb7f5f7bf4f1.herokuapp.com/api/customer-attributes?email=${encodeURIComponent(email)}`)
                .then(response => response.json())
                .then(data => {
                    console.log("API Response - Customer Attributes:", data);
                    const tableBody = document.querySelector("#attributesTable tbody");
                    tableBody.innerHTML = "";  

                    if (Object.keys(data).length === 0) {
                        tableBody.innerHTML = "<tr><td colspan='2'>No se encontraron datos</td></tr>";
                        return;
                    }

                    for (const [attribute, count] of Object.entries(data)) {
                        const row = document.createElement("tr");
                        row.innerHTML = `<td>${attribute}</td><td>${count}</td>`;
                        tableBody.appendChild(row);
                    }
                })
                .catch(error => console.error("Error al obtener los atributos del cliente:", error));
        }

    function fetchNetworkAttributes(email) {
        fetch(`https://order-vault-api-cb7f5f7bf4f1.herokuapp.com/api/customer-attributes-network?email=${encodeURIComponent(email)}`)
            .then(response => response.json())
            .then(data => {
                console.log("API Response - Network Attributes:", data);
    
                const tableBody = document.querySelector("#networkAttributesTable tbody");
                tableBody.innerHTML = "";  // Clear previous data
    
                if (data.message || Object.keys(data).length === 0) {
                    tableBody.innerHTML = "<tr><td colspan='2'>No se encontraron datos</td></tr>";
                    return;
                }
    
                // Render the network attributes data
                const networkData = data;
    
                // Display distinct phones
                const rowPhones = document.createElement("tr");
                rowPhones.innerHTML = `
                    <td>Teléfonos Distintos</td>
                    <td>${networkData.distinct_phones}</td>
                `;
                tableBody.appendChild(rowPhones);
    
                // Display distinct device IDs
                const rowDeviceIds = document.createElement("tr");
                rowDeviceIds.innerHTML = `
                    <td>Device IDs Distintos</td>
                    <td>${networkData.distinct_device_ids}</td>
                `;
                tableBody.appendChild(rowDeviceIds);
    
                // Display distinct card details
                const rowCardDetails = document.createElement("tr");
                rowCardDetails.innerHTML = `
                    <td>Detalles de Tarjetas Distintos</td>
                    <td>${networkData.distinct_card_details}</td>
                `;
                tableBody.appendChild(rowCardDetails);
    
                // Display distinct promocodes
                const rowPromocodes = document.createElement("tr");
                rowPromocodes.innerHTML = `
                    <td>Promocodes Distintos</td>
                    <td>${networkData.distinct_promocodes}</td>
                `;
                tableBody.appendChild(rowPromocodes);
    
                // Display distinct order IDs
                const rowIds = document.createElement("tr");
                rowIds.innerHTML = `
                    <td>Ordenes Distintas</td>
                    <td>${networkData.distinct_ids}</td>
                `;
                tableBody.appendChild(rowIds);
            })
            .catch(error => console.error("Error al obtener los atributos de la network:", error));
        }

    </script>

</body>
</html>
