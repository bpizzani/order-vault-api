<aside class="w-64 bg-[#121212] p-6 text-white flex flex-col">
    <div class="mb-8">
        <img src="{{ url_for('static', filename='images/rediim_logo.svg') }}" class="h-10 mx-auto" alt="Logo">
    </div>
    {% if client_id %}
    <div class="text-sm text-gray-400 mb-8 border-b border-gray-700 pb-4">
        <p class="text-xs uppercase">Client</p>
        <p class="text-white font-medium">{{ client_id }}</p>
        <p class="text-gray-500">{{ client_email }}</p>
    </div>
    {% endif %}

    <nav class="flex flex-col space-y-3">
        <a href="{{ url_for('home.promotion_ui') }}" class="sidebar-link">📊 Dashboard</a>
        <a href="{{ url_for('home.rules_ui') }}" class="sidebar-link">📐 Reglas</a>
        <a href="{{ url_for('home.customer_ui') }}" class="sidebar-link">🔍 User Search</a>
        <a href="{{ url_for('home.fingerprint') }}" class="sidebar-link">🔍 Fingerprint</a>
        <a href="https://rediim.com" class="sidebar-link">🌐 Web</a>
        <a href="/logout" class="sidebar-link">🚪 Logout</a>
    </nav>

    <style>
        .sidebar-link {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: all 0.2s ease;
            color: #d1d5db;
        }

        .sidebar-link:hover {
            background-color: #1f1f1f;
            color: #ffffff;
        }

        .sidebar-link.active {
            background-color: #ff3b2f;
            color: #ffffff;
        }
    </style>

    <script>
        // Optional: Highlight current link
        const links = document.querySelectorAll('.sidebar-link');
        const path = window.location.pathname;
        links.forEach(link => {
            if (link.getAttribute('href') === path) {
                link.classList.add('active');
            }
        });
    </script>
</aside>
