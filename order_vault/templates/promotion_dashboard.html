<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promocode Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 p-6">
            <h2 class="text-2xl font-bold mb-6">Rediim</h2>
            <nav>
                <ul>
                    <li class="mb-4"><a href="https://www.rediim.com/promotion_dashboard" class="text-gray-300 hover:text-white">Dashboard</a></li>
                    <li class="mb-4"><a href="https://www.rediim.com/rules" class="text-gray-300 hover:text-white">Reglas</a></li>
                    <li class="mb-4"><a href="https://www.rediim.com/island" class="text-gray-300 hover:text-white">User Search</a></li>
                    <li class="mb-4"><a href="https://www.rediim.com/" class="text-gray-300 hover:text-white">Web</a></li>
                </ul>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="flex-1 p-10">
            <!-- Search Bar -->
            <div class="mb-6 flex justify-center">
                <input type="text" id="promocodeInput" class="p-3 w-1/3 bg-gray-800 text-white border border-cyan-400 rounded-l-lg outline-none" placeholder="Enter promocode...">
                <button onclick="fetchPromocodeUsage()" class="bg-cyan-400 text-gray-900 px-5 py-3 rounded-r-lg font-bold hover:bg-cyan-300">Search</button>
            </div>

            <!-- Summary Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div class="bg-gray-800 p-6 rounded-lg text-center shadow-lg">
                    <h2 class="text-xl text-cyan-400">Total Users</h2>
                    <p id="totalOrders" class="text-3xl font-bold mt-2">0</p>
                </div>
                <div class="bg-gray-800 p-6 rounded-lg text-center shadow-lg">
                    <h2 class="text-xl text-green-400">Genuine Users</h2>
                    <p id="uniqueUsers" class="text-3xl font-bold mt-2">0</p>
                </div>
                <div class="bg-gray-800 p-6 rounded-lg text-center shadow-lg">
                    <h2 class="text-xl text-red-400">Abusive Users</h2>
                    <p id="abusiveUsers" class="text-3xl font-bold mt-2">0</p>
                    <p id="abusivePercentage" class="text-lg text-red-400 mt-2">0%</p>
                </div>
            </div>

            <!-- Bar Chart Section -->
            <div class="mb-8">
                <canvas id="promocodeChart"></canvas>
            </div>

            <!-- Loading Indicator -->
            <div id="loading" class="text-center text-cyan-400 mt-4 hidden">Loading...</div>

            <div class="mb-8">
            <h3 class="text-2xl font-bold text-cyan-400 text-center mb-4">Abuse Rate por Día</h3>
            <canvas id="abuseRateChart"></canvas>
            </div>
            
            <div class="mb-8">
            <h3 class="text-2xl font-bold text-cyan-400 text-center mb-4">Total Orders por Día</h3>
            <canvas id="totalOrdersChart"></canvas>
            </div>

            
        </main>
    </div>


    <script>
        
        // Fetching promocode usage and rendering the dashboard
    function fetchPromocodeUsage() {
        const promocode = document.getElementById("promocodeInput").value.trim();
        if (!promocode) {
            alert("Please enter a promocode");
            return;
        }
    
        document.getElementById("loading").classList.remove("hidden");
    
        // Fetch summary usage data
        fetch(`https://order-vault-api-cb7f5f7bf4f1.herokuapp.com/api/promocode/usage?promocode=${promocode}`,  
              method: "GET",
              credentials: "include")
            .then(response => response.json())
            .then(data => {
                if (!data || data.length === 0 || data.message) {
                    alert("No data found for this promocode");
                    document.getElementById("loading").classList.add("hidden");
                    return;
                }
        
                const promoData = data[0];
        
                // Update stats
                document.getElementById("totalOrders").innerText = promoData.total_users || 0;
                document.getElementById("uniqueUsers").innerText = promoData.genuine_users || 0;
                document.getElementById("abusiveUsers").innerText = promoData.abusive_users || 0;
                document.getElementById("abusivePercentage").innerText = promoData.abuse_user_rate_percentage ? `${promoData.abuse_user_rate_percentage.toFixed(2)}%` : "0%";
        
                // Chart data
                const chartData = {
                    labels: ['Genuine Orders', 'Abusive Orders'],
                    datasets: [{
                        label: 'Promocode Order Statistics',
                        data: [promoData.genuine_orders, promoData.abusive_orders],
                        backgroundColor: ['#00bcd4', '#f44336'],
                        borderColor: ['#0097a7', '#d32f2f'],
                        borderWidth: 1
                    }]
                };
        
                renderBarChart(chartData);
            })
            .catch(error => {
                console.error("Error fetching promocode usage data:", error);
                alert("Failed to fetch data. Please try again later.");
            })
            .finally(() => {
                document.getElementById("loading").classList.add("hidden");
            });
    
        // Fetch abuse rate by day
        fetch(`https://order-vault-api-cb7f5f7bf4f1.herokuapp.com/api/promocode/abuse-by-day?promocode=${promocode}`,  
              method: "GET",
              credentials: "include")
            .then(response => response.json())
            .then(data => {
                // ✅ Log raw data for debugging
                console.log("Abuse by Day API Data:", data);
        
                // ✅ Filter out invalid entries
                const filtered = data.filter(
                    item =>
                        item.order_date &&
                        typeof item.abuse_rate === "number" &&
                        item.abuse_rate >= 0
                );
        
                // ✅ Optional: sort by date if backend doesn't guarantee it
                filtered.sort((a, b) => new Date(a.order_date) - new Date(b.order_date));
        
                const labels = filtered.map(item => item.order_date);
                const abuseRates = filtered.map(item => parseFloat(item.abuse_rate.toFixed(2)));
                const totalOrders = filtered.map(item => item.total_orders || 0);
        
                if (labels.length === 0) {
                    console.warn("No valid abuse rate data available to render.");
                    return;
                }
        
                renderAbuseRateChart(labels, abuseRates);
                renderTotalOrdersChart(labels, totalOrders);
            })
            .catch(error => {
                console.error("Error fetching abuse-by-day data:", error);
            });
    }

        
        
        // Function to render the Bar Chart
        function renderBarChart(chartData) {
            const ctx = document.getElementById("promocodeChart").getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: chartData,
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        tooltip: {
                            callbacks: {
                                label: function(tooltipItem) {
                                    return `${tooltipItem.label}: ${tooltipItem.raw}`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderAbuseRateChart(labels, data) {
            const ctx = document.getElementById("abuseRateChart").getContext("2d");
        
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Abuse Rate (%)',
                        data: data,
                        fill: false,
                        borderColor: '#f87171',
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            title: {
                                display: true,
                                text: 'Abuse Rate (%)'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Date'
                            }
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: (context) => `${context.parsed.y}%`
                            }
                        }
                    }
                }
            });
        }

        function renderTotalOrdersChart(labels, data) {
            const ctx = document.getElementById("totalOrdersChart").getContext("2d");
        
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Orders per Day',
                        data: data,
                        backgroundColor: '#38bdf8',
                        borderColor: '#0ea5e9',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Orders'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Date'
                            }
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: (context) => `Total Orders: ${context.raw}`
                            }
                        }
                    }
                }
            });
        }
    </script>

</body>
</html>
