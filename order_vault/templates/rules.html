<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rules — Rediim</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
  <style>
    /* ── PAGE-SPECIFIC STYLES ── */
 
    .page-actions { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
    .add-btn { background: #ff3b2f; color: #fff; border: none; border-radius: 7px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
    .add-btn:hover { background: #ff5a50; }
 
    /* Rules grid */
    .rules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .rule-card { background: #141414; border: 1px solid #1e1e1e; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .rule-card-header { display: flex; align-items: center; justify-content: space-between; }
    .rule-attr { font-size: 14px; font-weight: 700; color: #fff; }
    .rule-badge { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 20px; padding: 3px 10px; font-size: 11px; color: #555; font-weight: 600; }
    .rule-rows { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
    .rule-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    .rule-row-label { color: #444; }
    .rule-row-val { color: #ccc; font-weight: 500; }
    .rule-card-footer { border-top: 1px solid #1e1e1e; padding-top: 12px; display: flex; justify-content: flex-end; }
    .delete-btn { display: flex; align-items: center; gap: 5px; background: transparent; border: 1px solid #2a2a2a; border-radius: 6px; padding: 5px 10px; font-size: 12px; color: #555; cursor: pointer; transition: all 0.15s; }
    .delete-btn:hover { border-color: #ff3b2f; color: #ff3b2f; background: #1a1010; }
    .delete-icon { width: 13px; height: 13px; flex-shrink: 0; }
 
    .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #2e2e2e; }
    .empty-state p { font-size: 14px; margin-top: 8px; }
 
    /* ── MODAL OVERLAY ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: #141414; border: 1px solid #252525; border-radius: 14px; padding: 28px; width: 100%; max-width: 420px; margin: 0 16px; }
    .modal-title { font-size: 16px; font-weight: 800; color: #fff; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; }
    .form-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #444; }
    .form-input, .form-select {
      background: #0e0e0e; border: 1px solid #222; border-radius: 7px;
      color: #ddd; font-size: 13px; padding: 9px 12px; outline: none;
      color-scheme: dark; width: 100%; transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus { border-color: #00d4ff; }
    .form-select option { background: #141414; }
    .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
    .modal-submit { flex: 1; background: #ff3b2f; color: #fff; border: none; border-radius: 7px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
    .modal-submit:hover { background: #ff5a50; }
    .modal-cancel { flex: 1; background: transparent; color: #555; border: 1px solid #252525; border-radius: 7px; padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .modal-cancel:hover { color: #aaa; border-color: #333; background: #1a1a1a; }
  </style>
</head>
<body>
 
<div class="shell">
 
  {% include "_sidebar.html" %}
 
  <div class="right-col">
 
    {% set page_title = "Rules" %}
    {% include "_topbar.html" %}
 
    <main class="main-scroll">
 
      <div class="page-actions">
        <div>
          <div class="accent-bar"></div>
          <h1 class="page-title">Rules</h1>
          <p class="page-sub">Define thresholds and conditions to flag or block abusive accounts.</p>
        </div>
        <button class="add-btn" id="openModal">+ Add rule</button>
      </div>
 
      <div class="rules-grid" id="rulesGrid">
        <div class="empty-state">
          <p>No rules yet. Click <strong style="color:#555">+ Add rule</strong> to get started.</p>
        </div>
      </div>
 
    </main>
  </div>
</div>
 
<!-- ADD RULE MODAL -->
<div class="modal-overlay" id="ruleModal">
  <div class="modal-box">
    <div class="modal-title">Add rule</div>
    <form id="ruleForm">
 
      <div class="form-group">
        <label class="form-label">Attribute</label>
        <select id="attribute" class="form-select">
          <option value="device_id">Device ID</option>
          <option value="email">Email</option>
          <option value="phone">Phone</option>
          <option value="card_details">Card details</option>
        </select>
      </div>
 
      <div class="form-group">
        <label class="form-label">Threshold</label>
        <input type="number" id="threshold" class="form-input" placeholder="e.g. 3" required>
      </div>
 
      <div class="form-group">
        <label class="form-label">Promocode</label>
        <input type="text" id="promocode" class="form-input" placeholder="e.g. SUMMER20" required>
      </div>
 
      <div class="modal-actions">
        <button type="button" class="modal-cancel" id="closeModal">Cancel</button>
        <button type="submit" class="modal-submit">Add rule</button>
      </div>
 
    </form>
  </div>
</div>
 
<script>
  // ── Modal ──
  document.getElementById('openModal').addEventListener('click', () => {
    document.getElementById('ruleModal').classList.add('open');
  });
  document.getElementById('closeModal').addEventListener('click', () => {
    document.getElementById('ruleModal').classList.remove('open');
  });
  document.getElementById('ruleModal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
 
  // ── Submit ──
  document.getElementById('ruleForm').addEventListener('submit', function(e) {
    e.preventDefault();
    addRule();
  });
 
  function addRule() {
    const attribute = document.getElementById('attribute').value;
    const threshold = document.getElementById('threshold').value;
    const promocode = document.getElementById('promocode').value;
 
    fetch('/api/rules', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ attribute, threshold, promocode }),
      credentials: 'include'
    })
    .then(() => {
      document.getElementById('ruleForm').reset();
      document.getElementById('ruleModal').classList.remove('open');
      loadRules();
    })
    .catch(console.error);
  }
 
  // ── Load rules ──
  function loadRules() {
    fetch('/api/rules', { method: 'GET', credentials: 'include' })
      .then(r => r.json())
      .then(data => {
        const grid = document.getElementById('rulesGrid');
        if (!data.length) {
          grid.innerHTML = `<div class="empty-state"><p>No rules yet. Click <strong style="color:#555">+ Add rule</strong> to get started.</p></div>`;
          return;
        }
        grid.innerHTML = '';
        data.forEach(rule => {
          const card = document.createElement('div');
          card.className = 'rule-card';
          card.innerHTML = `
            <div class="rule-card-header">
              <span class="rule-attr">${escHtml(rule.attribute)}</span>
              <span class="rule-badge">#${rule.id}</span>
            </div>
            <div class="rule-rows">
              <div class="rule-row">
                <span class="rule-row-label">Threshold</span>
                <span class="rule-row-val">${escHtml(String(rule.threshold))}</span>
              </div>
              <div class="rule-row">
                <span class="rule-row-label">Promocode</span>
                <span class="rule-row-val">${escHtml(rule.promocode)}</span>
              </div>
            </div>
            <div class="rule-card-footer">
              <button class="delete-btn" onclick="deleteRule(${rule.id})">
                <svg class="delete-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 7L5 7M10 11v6M14 11v6M6 7l1 12a2 2 0 002 2h6a2 2 0 002-2l1-12M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3"/>
                </svg>
                Delete
              </button>
            </div>
          `;
          grid.appendChild(card);
        });
      })
      .catch(console.error);
  }
 
  // ── Delete ──
  function deleteRule(id) {
    fetch(`/api/rules/${id}`, { method: 'DELETE', credentials: 'include' })
      .then(() => loadRules())
      .catch(console.error);
  }
 
  // ── XSS guard ──
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
 
  document.addEventListener('DOMContentLoaded', loadRules);
</script>
 
</body>
</html>
