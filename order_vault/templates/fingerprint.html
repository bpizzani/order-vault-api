<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duplicate Account Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#0d0d0d] text-white">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        {% include "_sidebar.html" %}

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-10">
            <!-- Title -->
            <h1 class="text-4xl font-extrabold mb-8">Duplicate Account Intelligence</h1>

            <!-- Metrics Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="bg-[#1f1f1f] p-6 rounded-xl shadow-lg">
                    <h2 class="text-lg text-[#00d4ff]">Total Devices</h2>
                    <p id="totalDevices" class="text-4xl font-bold mt-2">0</p>
                </div>
                <div class="bg-[#1f1f1f] p-6 rounded-xl shadow-lg">
                    <h2 class="text-lg text-green-400">Total Users</h2>
                    <p id="totalUsers" class="text-4xl font-bold mt-2">0</p>
                </div>
                <div class="bg-[#1f1f1f] p-6 rounded-xl shadow-lg">
                    <h2 class="text-lg text-[#ff3b2f]">Abusive Devices</h2>
                    <p id="abusiveDevices" class="text-4xl font-bold mt-2">0</p>
                </div>
            </div>

            <!-- Top Devices Chart -->
            <div class="bg-[#1a1a1a] p-6 rounded-lg shadow">
                <h3 class="text-xl font-bold text-white mb-4 text-center">Top Devices by User Count</h3>
                <canvas id="deviceUsageChart"></canvas>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-12">
                <!-- Duplicate Rate Line Chart -->
                <div class="bg-[#1a1a1a] p-6 rounded-lg shadow">
                    <h3 class="text-xl font-bold text-white mb-4 text-center">Daily Duplicate Rate (%)</h3>
                    <canvas id="duplicateRateChart"></canvas>
                </div>
            
                <!-- Duplicate User Count Bar Chart -->
                <div class="bg-[#1a1a1a] p-6 rounded-lg shadow">
                    <h3 class="text-xl font-bold text-white mb-4 text-center">Duplicate vs Total Devices</h3>
                    <canvas id="duplicateUserChart"></canvas>
                </div>
            </div>
            <!-- Loader -->
            <div id="loading" class="text-center mt-10 hidden">
                <p class="text-sm text-gray-400">Loading data...</p>
            </div>
        </main>
    </div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("loading").classList.remove("hidden");

        // Fetch device usage stats
        fetch(`/api/fingerprint/device-usage`)
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                    return;
                }
                const duplicateRate = (data.duplicate_users / data.total_devices) * 100;
                // Update counters
                document.getElementById("totalDevices").innerText = data.total_devices;
                document.getElementById("totalUsers").innerText = data.total_users;
                document.getElementById("abusiveDevices").innerText = `${duplicateRate.toFixed(2)}%`;

                // Chart for users per device
                const labels = data.user_per_device.map(d => d.device_id);
                const counts = data.user_per_device.map(d => d.user_count);

                const ctx = document.getElementById("deviceUsageChart").getContext("2d");
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [{
                            label: 'Users per Device',
                            data: counts,
                            backgroundColor: '#facc15',
                            borderColor: '#eab308',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            tooltip: {
                                callbacks: {
                                    label: (context) => `${context.raw} users`
                                }
                            },
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: {
                                    display: true,
                                    text: 'User Count'
                                }
                            },
                            x: {
                                ticks: {
                                    callback: function(value, index, ticks) {
                                        return labels[index].slice(0, 6) + '...';  // Truncate device_id
                                    }
                                },
                                title: {
                                    display: true,
                                    text: 'Device ID'
                                }
                            }
                        }
                    }
                });
            })
            .catch(err => {
                console.error("Error fetching device usage:", err);
                alert("Failed to load data.");
            })
            .finally(() => {
                document.getElementById("loading").classList.add("hidden");
            });

        // 🔥 NEW: Fetch duplicate rate by day
        fetch("/api/fingerprint/duplicate-rate-daily")
            .then(res => res.json())
            .then(data => {
                if (!Array.isArray(data)) {
                    console.error("Unexpected response for duplicate rate:", data);
                    return;
                }

                const labels = data.map(d => d.date);
                const duplicateRate = data.map(d => d.duplicate_rate);
                const duplicates = data.map(d => d.total_duplicate_user);
                const totals = data.map(d => d.total_users);

                // Line chart: duplicate rate
                const rateCtx = document.getElementById("duplicateRateChart").getContext("2d");
                new Chart(rateCtx, {
                    type: "line",
                    data: {
                        labels,
                        datasets: [{
                            label: "Duplicate Rate (%)",
                            data: duplicateRate,
                            borderColor: "#f87171",
                            backgroundColor: "#f87171",
                            tension: 0.3,
                            fill: false
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 100,
                                title: {
                                    display: true,
                                    text: "Rate (%)"
                                }
                            },
                            x: {
                                title: {
                                    display: true,
                                    text: "Date"
                                }
                            }
                        }
                    }
                });

                // Bar chart: duplicate vs total
                const countCtx = document.getElementById("duplicateUserChart").getContext("2d");
                new Chart(countCtx, {
                    type: "bar",
                    data: {
                        labels,
                        datasets: [
                            {
                                label: "Duplicate Devices",
                                data: duplicates,
                                backgroundColor: "#fb923c"
                            },
                            {
                                label: "Total Devices",
                                data: totals,
                                backgroundColor: "#38bdf8"
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: {
                                    display: true,
                                    text: "Devices"
                                }
                            },
                            x: {
                                title: {
                                    display: true,
                                    text: "Date"
                                }
                            }
                        }
                    }
                });
            })
            .catch(err => {
                console.error("Error fetching daily duplicate rate:", err);
            });
    });
</script>
    </script>
</body>
</html>
